model_auto_compact_token_limit = {{CODEX_COMPACT_TARGET}}
tool_output_token_limit = 3000
experimental_compact_prompt_file = "{{CODEX_COMPACT_PROMPT}}"

[features]
hooks = true

[[hooks.SessionStart]]
matcher = "startup|resume|compact"

[[hooks.SessionStart.hooks]]
type = "command"
command = "TRIM_STATE_DIR={{TRIM_STATE_DIR}} {{TRIM_HELPER}} ledger-context --harness codex"
timeout = 5
statusMessage = "Loading trim ledger"

[[hooks.PreToolUse]]
matcher = "Bash|apply_patch"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "TRIM_STATE_DIR={{TRIM_STATE_DIR}} {{TRIM_HELPER}} observe-preflight --harness codex"
timeout = 5
statusMessage = "Checking context budget"

[[hooks.PostToolUse]]
matcher = "Bash|apply_patch"

[[hooks.PostToolUse.hooks]]
type = "command"
command = "TRIM_STATE_DIR={{TRIM_STATE_DIR}} {{TRIM_HELPER}} observe-or-clamp --harness codex"
timeout = 10
statusMessage = "Trimming tool output"

[[hooks.PostCompact]]
matcher = "manual|auto"

[[hooks.PostCompact.hooks]]
type = "command"
command = "TRIM_STATE_DIR={{TRIM_STATE_DIR}} {{TRIM_HELPER}} postcompact --harness codex"
timeout = 5
statusMessage = "Recording compaction"
